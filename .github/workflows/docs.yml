name: docs

# Build the Sphinx documentation on every push to `main` and (optionally)
# deploy it to GitHub Pages. Pages must be enabled once in
# `Settings -> Pages -> Source: GitHub Actions` for the deploy job to
# actually publish; until then the build job still runs and verifies the
# docs compile cleanly.
#
# For private repositories, GitHub Pages requires a paid plan (Pro,
# Team, or Enterprise). If that's not available, use the same Sphinx
# config via Read the Docs — see `.readthedocs.yaml` at the repo root.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment in flight at a time; never cancel a deploy
# already running (canceling can leave the live site half-updated).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[docs]"

      - name: Build HTML
        # Not using `-W` (warnings-as-errors): sphinx-autoapi's
        # rendering of XRMMapH5 docstrings trips 2 cosmetic docutils
        # warnings about nested-quote inline literals; the HTML output
        # is fine. Local devs see the warnings; CI doesn't fail on them.
        run: |
          sphinx-build -b html docs docs/_build/html

      - name: Upload Pages artefact
        # Only upload on push to main; PR builds verify but don't ship.
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    # Deploy only after a successful push-to-main build.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
